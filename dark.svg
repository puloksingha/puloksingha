<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="1180" height="610" role="img" aria-label="Pulok Singha dark hero banner with photo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#030712"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 120) scale(340 220)">
      <stop offset="0" stop-color="#7C3AED" stop-opacity=".35"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 520) scale(420 260)">
      <stop offset="0" stop-color="#06B6D4" stop-opacity=".30"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="avatarClip">
      <circle cx="239" cy="230" r="92"/>
    </clipPath>
  </defs>

  <rect width="1180" height="610" rx="28" fill="url(#bg)"/>
  <rect x="-80" y="-40" width="520" height="360" fill="url(#g1)" filter="url(#blur)"/>
  <rect x="620" y="260" width="620" height="360" fill="url(#g2)" filter="url(#blur)"/>

  <rect x="24" y="24" width="430" height="562" rx="22" fill="#0F172A" fill-opacity=".78" stroke="rgba(255,255,255,.10)"/>
  <rect x="474" y="24" width="682" height="562" rx="22" fill="#0F172A" fill-opacity=".70" stroke="rgba(255,255,255,.10)"/>

  <!-- photo -->
  <circle cx="239" cy="230" r="100" fill="url(#acc)" opacity=".25"/>
  <g clip-path="url(#avatarClip)">
    <image href="https://raw.githubusercontent.com/puloksingha/puloksingha/main/assets/profile-pulok.jpg" x="147" y="138" width="184" height="184" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <circle cx="239" cy="230" r="92" fill="none" stroke="url(#acc)" stroke-width="3"/>
  <text x="239" y="355" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#94A3B8">puloksingha</text>

  <text x="58" y="92" font-family="monospace" font-size="20" fill="url(#acc)">┌───────────────────────┐</text>
  <text x="58" y="122" font-family="monospace" font-size="20" fill="url(#acc)">│   PULOK TERMINAL v3   │</text>
  <text x="58" y="152" font-family="monospace" font-size="20" fill="url(#acc)">└───────────────────────┘</text>
  <text x="66" y="420" font-family="monospace" font-size="16" fill="#67E8F9">$ whoami</text>
  <text x="66" y="446" font-family="monospace" font-size="16" fill="#A78BFA">Pulok Singha</text>
  <text x="66" y="472" font-family="monospace" font-size="16" fill="#22D3EE">$ stack --top</text>
  <text x="66" y="498" font-family="monospace" font-size="16" fill="#10B981">React • Node • AI</text>

  <text x="520" y="104" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="700" fill="#F8FAFC">Hi 👋</text>
  <text x="520" y="146" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="800" fill="#F8FAFC">I'm Pulok Singha</text>
  <text x="520" y="188" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="600" fill="url(#acc)">Full Stack Developer • UI Engineer • AI Enthusiast</text>
  <text x="520" y="246" font-family="Inter,Arial,sans-serif" font-size="18" fill="#CBD5E1">📍 Assam, India</text>
  <text x="520" y="278" font-family="Inter,Arial,sans-serif" font-size="18" fill="#CBD5E1">🎓 Computer Science</text>
  <text x="520" y="310" font-family="Inter,Arial,sans-serif" font-size="18" fill="#CBD5E1">⚡ Focus: AI-powered Web Engineering</text>
  <text x="520" y="342" font-family="Inter,Arial,sans-serif" font-size="18" fill="#CBD5E1">🌐 Portfolio: pulok.vercel.app</text>
  <text x="520" y="374" font-family="Inter,Arial,sans-serif" font-size="18" fill="#CBD5E1">✉️ hello@pulok.dev</text>

  <g font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700">
    <rect x="520" y="420" width="78" height="32" rx="16" fill="#1E293B" stroke="#334155"/><text x="559" y="441" text-anchor="middle" fill="#E2E8F0">React</text>
    <rect x="608" y="420" width="86" height="32" rx="16" fill="#1E293B" stroke="#334155"/><text x="651" y="441" text-anchor="middle" fill="#E2E8F0">Next.js</text>
    <rect x="704" y="420" width="84" height="32" rx="16" fill="#1E293B" stroke="#334155"/><text x="746" y="441" text-anchor="middle" fill="#E2E8F0">Node.js</text>
    <rect x="798" y="420" width="104" height="32" rx="16" fill="#1E293B" stroke="#334155"/><text x="850" y="441" text-anchor="middle" fill="#E2E8F0">TypeScript</text>
  </g>
</svg>
